version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: hl_prod_mongodb
    restart: always
    volumes:
      - hl_prod_mongo_data:/data/db
    networks:
      - hl_prod_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hl_prod_redis
    restart: always
    volumes:
      - hl_prod_redis_data:/data
    networks:
      - hl_prod_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hl_prod_backend
    restart: always
    ports:
      - '8001:8001'
    env_file:
      - ./backend/.env.production
    environment:
      - NODE_ENV=production
      - MONGO_URL=mongodb://mongodb:27017
      - REDIS_HOST=redis
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hl_prod_net
    healthcheck:
      # Map natively to the new App Health Route
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8001/api/v1/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Override at build-time pointing to your actual domain ingress
        - REACT_APP_BACKEND_URL=https://api.yourdomain.com
    container_name: hl_prod_frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hl_prod_net

volumes:
  hl_prod_mongo_data:
  hl_prod_redis_data:


networks:
  hl_prod_net:
    driver: bridge
